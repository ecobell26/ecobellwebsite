<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ecobell Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&family=Nanum+Square:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

    /* ── 로그인 ── */
    .login-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 9999; background: url('assets/admin-bg.jpg') center/cover no-repeat; overflow: hidden; }
    .login-deco { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; pointer-events: none; z-index: 0; }
    .login-overlay::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.3); z-index: 1; pointer-events: none; }
    .login-box { background: #fff; border-radius: 12px; padding: 48px 40px 25px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); position: relative; z-index: 2; }
    .login-logo { margin-bottom: 8px; }
    .login-logo img { height: 36px; width: auto; display: block; }
    .login-sub { font-size: 13px; color: #999; margin-bottom: 32px; }
    .login-box input { width: 100%; height: 44px; border: 1px solid #e0e0e0; border-radius: 8px; padding: 0 14px; font-size: 14px; margin-bottom: 12px; outline: none; transition: border-color 0.2s; }
    .login-box input:focus { border-color: #1E8DCD; }
    .login-save-id { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
    .login-save-id input[type="checkbox"] { width: 15px; height: 15px; accent-color: #1E8DCD; cursor: pointer; margin: 0; }
    .login-save-id label { font-size: 13px; color: #666; cursor: pointer; user-select: none; }
    .login-btn { width: 100%; height: 44px; background: #1E8DCD; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
    .login-btn:hover { background: #1679b3; }
    .login-error { color: #e63946; font-size: 13px; margin-top: 10px; min-height: 18px; text-align: center; }

    /* ── 레이아웃 ── */
    .admin-layout { display: flex; min-height: 100vh; }

    /* ── 사이드바 ── */
    .sidebar { width: 220px; background: #1a1f36; color: #fff; display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .sidebar-logo img { height: 28px; width: auto; display: block; filter: brightness(0) invert(1); margin-left: 7px; }
    .sidebar-nav { flex: 1; padding: 16px 0; }
    .nav-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 20px; background: none; border: none; color: rgba(255,255,255,0.6); font-size: 14px; cursor: pointer; transition: all 0.15s; text-align: left; border-left: 3px solid transparent; }
    .nav-btn:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .nav-btn.active { color: #fff; background: rgba(30,141,205,0.18); border-left-color: #1E8DCD; }
    .nav-btn .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
    .preview-site-btn { width: 100%; padding: 9px; background: rgba(30,141,205,0.18); border: 1px solid rgba(30,141,205,0.4); border-radius: 6px; color: #6ec6f5; font-size: 13px; cursor: pointer; transition: all 0.15s; margin-bottom: 8px; }
    .preview-site-btn:hover { background: rgba(30,141,205,0.3); color: #fff; }
    .logout-btn { width: 100%; padding: 9px; background: rgba(255,255,255,0.07); border: none; border-radius: 6px; color: rgba(255,255,255,0.6); font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .logout-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    /* ── 웹사이트 미리보기 오버레이 ── */
    .site-preview-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 28px 24px 24px; }
    .site-preview-notice { font-size: 12px; color: rgba(255,255,255,0.55); margin-bottom: 12px; text-align: center; letter-spacing: 0.2px; }
    .site-preview-bar { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1300px; margin-bottom: 10px; }
    .site-preview-bar span { font-size: 13px; color: rgba(255,255,255,0.7); font-weight: 600; }
    .site-preview-close { background: rgba(255,255,255,0.1); border: none; border-radius: 6px; color: #fff; font-size: 13px; padding: 6px 14px; cursor: pointer; transition: background 0.15s; }
    .site-preview-close:hover { background: rgba(255,255,255,0.2); }
    .site-preview-frame { width: 100%; max-width: 1300px; flex: 1; border: none; border-radius: 10px; background: #fff; min-height: 0; }

    /* ── 메인 ── */
    .main-content { margin-left: 220px; flex: 1; padding: 32px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .section-title { font-size: 22px; font-weight: 700; color: #1a1f36; }
    .section-count { font-size: 14px; color: #999; margin-left: 8px; font-weight: 400; }
    .add-btn { display: inline-flex; align-items: center; gap: 6px; padding: 0 18px; height: 38px; background: #1E8DCD; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .add-btn:hover { background: #1679b3; }

    /* ── 카드/테이블 ── */
    .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); overflow: hidden; }
    .item-list { display: flex; flex-direction: column; }
    .item-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid #f0f0f0; transition: background 0.12s; }
    .item-row:last-child { border-bottom: none; }
    .item-row:hover { background: #fafbfc; }
    .item-row.dragging { opacity: 0.4; }
    .item-row.drag-over { border-top: 2px solid #1E8DCD; }
    .drag-handle { cursor: grab; color: #ccc; font-size: 16px; flex-shrink: 0; user-select: none; padding: 0 2px; }
    .drag-handle:active { cursor: grabbing; }
    .item-pin { font-size: 16px; cursor: pointer; flex-shrink: 0; opacity: 0.35; transition: opacity 0.15s, transform 0.15s; }
    .item-pin.pinned { opacity: 1; }
    .item-pin:hover { opacity: 0.7; transform: scale(1.15); }
    .item-info { flex: 1; min-width: 0; }
    .item-title { font-size: 14px; font-weight: 500; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { font-size: 12px; color: #aaa; margin-top: 2px; }
    .item-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #eef6fb; color: #1E8DCD; margin-right: 6px; }
    .item-tag.unpub { background: #f5f5f5; color: #bbb; }
    .pub-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; flex-shrink: 0; }
    .toggle-switch { width: 36px; height: 20px; background: #ddd; border-radius: 10px; position: relative; transition: background 0.2s; }
    .toggle-switch.on { background: #1E8DCD; }
    .toggle-switch::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: left 0.2s; }
    .toggle-switch.on::after { left: 18px; }
    .action-btn { width: 30px; height: 30px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; background: transparent; }
    .action-btn.edit { color: #555; }
    .action-btn.edit:hover { background: #eef; color: #1E8DCD; }
    .action-btn.del { color: #ccc; }
    .action-btn.del:hover { background: #fff0f0; color: #e63946; }

    /* ── 폼 ── */
    .form-card { background: #fff; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); padding: 28px; margin-bottom: 24px; }
    .form-title { font-size: 16px; font-weight: 700; color: #1a1f36; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label { font-size: 13px; font-weight: 600; color: #555; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 9px 12px; border: 1px solid #e0e0e0; border-radius: 7px; font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #1E8DCD; }
    .form-textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
    .form-check-row { display: flex; gap: 20px; align-items: center; margin-top: 4px; }
    .form-check { display: flex; align-items: center; gap: 7px; cursor: pointer; font-size: 14px; color: #555; }
    .form-check input[type="checkbox"] { width: 16px; height: 16px; accent-color: #1E8DCD; cursor: pointer; }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid #f0f0f0; }
    .btn-cancel { padding: 0 20px; height: 38px; background: #f5f5f5; border: none; border-radius: 7px; font-size: 14px; cursor: pointer; color: #666; transition: background 0.15s; }
    .btn-cancel:hover { background: #eee; }
    .btn-save { padding: 0 24px; height: 38px; background: #1E8DCD; border: none; border-radius: 7px; font-size: 14px; font-weight: 600; color: #fff; cursor: pointer; transition: background 0.15s; }
    .btn-save:hover { background: #1679b3; }
    .btn-save:disabled { background: #a0cde8; cursor: not-allowed; }

    /* ── 파일 업로드 ── */
    .upload-area { border: 2px dashed #e0e0e0; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: border-color 0.2s; position: relative; }
    .upload-area:hover { border-color: #1E8DCD; }
    .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-hint { font-size: 13px; color: #aaa; margin-top: 4px; }
    .upload-preview { max-width: 180px; max-height: 120px; border-radius: 6px; margin-top: 10px; object-fit: cover; display: none; }
    .upload-filename { font-size: 13px; color: #1E8DCD; margin-top: 6px; display: none; }
    .upload-progress { font-size: 12px; color: #aaa; margin-top: 4px; }

    /* ── 빈 상태 ── */
    .empty-state { text-align: center; padding: 60px 20px; color: #bbb; }
    .empty-state p { font-size: 15px; margin-top: 8px; }

    /* ── 토스트 ── */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1f36; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 9999; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: #e63946; }

    /* ── 로딩 ── */
    .loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

    /* ── 구분선 ── */
    .divider { height: 1px; background: #f0f0f0; margin: 20px 0; }

    /* ── 리치 텍스트 에디터 ── */
    .rte-wrap { border: 1px solid #e0e0e0; border-radius: 7px; overflow: hidden; transition: border-color 0.2s; }
    .rte-wrap:focus-within { border-color: #1E8DCD; }
    .rte-toolbar { display: flex; flex-wrap: wrap; gap: 4px; padding: 7px 10px; background: #f8f9fa; border-bottom: 1px solid #e0e0e0; align-items: center; }
    .rte-toolbar button { padding: 3px 9px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; color: #555; transition: background 0.15s; }
    .rte-toolbar button:hover { background: #eef6fb; border-color: #1E8DCD; color: #1E8DCD; }
    .rte-toolbar .rte-sep { width: 1px; height: 18px; background: #e0e0e0; margin: 0 2px; }
    .rte-content { min-height: 140px; padding: 10px 12px; font-size: 14px; line-height: 1.7; outline: none; }
    .rte-content:empty::before { content: attr(data-placeholder); color: #bbb; pointer-events: none; }
    .rte-content a { color: #1E8DCD; text-decoration: underline; }
    /* 글자색 팔레트 */
    .rte-color-btn { position: relative; display: inline-flex; }
    .rte-color-btn > button { display: flex; align-items: center; gap: 2px; }
    .rte-color-indicator { display: inline-block; width: 14px; height: 3px; border-radius: 2px; background: #000; margin-top: 2px; }
    .rte-color-palette { position: absolute; top: calc(100% + 4px); left: 0; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px; display: none; grid-template-columns: repeat(5, 22px); gap: 5px; z-index: 200; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .rte-color-palette.open { display: grid; }
    .rte-color-swatch { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(0,0,0,0.12); transition: transform 0.1s; }
    .rte-color-swatch:hover { transform: scale(1.2); }

    /* ── 태그 입력 ── */
    .tag-wrap { border: 1px solid #e0e0e0; border-radius: 7px; padding: 6px 10px; display: flex; flex-wrap: wrap; gap: 6px; min-height: 44px; cursor: text; transition: border-color 0.2s; align-items: center; }
    .tag-wrap:focus-within { border-color: #1E8DCD; }
    .tag-item { display: inline-flex; align-items: center; gap: 4px; background: #eef6fb; color: #1E8DCD; border-radius: 4px; padding: 2px 8px; font-size: 13px; }
    .tag-item button { background: none; border: none; cursor: pointer; color: #1E8DCD; font-size: 15px; line-height: 1; padding: 0; }
    .tag-field { border: none; outline: none; font-size: 14px; flex: 1; min-width: 120px; background: transparent; }

    /* ── 다중 이미지 ── */
    .image-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; align-items: flex-end; }
    .image-item { position: relative; width: 100px; height: 80px; border-radius: 6px; overflow: hidden; border: 1px solid #e0e0e0; flex-shrink: 0; }
    .image-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .image-item .img-del { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.55); color: #fff; border: none; border-radius: 3px; width: 18px; height: 18px; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .image-item .img-badge { position: absolute; bottom: 3px; left: 3px; background: #1E8DCD; color: #fff; border-radius: 3px; font-size: 10px; padding: 1px 5px; }
    .image-add-btn { width: 100px; height: 80px; border: 2px dashed #e0e0e0; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #aaa; font-size: 20px; gap: 2px; transition: border-color 0.2s; background: none; flex-shrink: 0; }
    .image-add-btn span { font-size: 11px; }
    .image-add-btn:hover { border-color: #1E8DCD; color: #1E8DCD; }

    /* ── 첨부파일 목록 ── */
    .attach-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .attach-item { display: flex; align-items: center; gap: 8px; padding: 7px 12px; background: #f8f9fa; border-radius: 6px; font-size: 13px; }
    .attach-item .attach-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #444; }
    .attach-item .attach-del { background: none; border: none; cursor: pointer; color: #ccc; font-size: 16px; line-height: 1; flex-shrink: 0; padding: 0; }
    .attach-item .attach-del:hover { color: #e63946; }

    /* ── 공지사항 본문 타이포 미리보기 ── */
    .rte-content.notice-rte { font-family: 'Nanum Square', 'NanumSquare', sans-serif; font-weight: 400; font-size: 16px; color: #000; line-height: 40px; letter-spacing: 0; text-align: left; word-break: keep-all; overflow-wrap: break-word; }
    .rte-content.notice-rte p { margin-bottom: 0; }
    .rte-content.notice-rte p:last-child { margin-bottom: 0; }

    /* ── RTE 이미지 블록 ── */
    .rte-img-block { display: block; margin: 15px 0; text-align: center; }
    .rte-img { cursor: pointer; display: inline-block; max-width: 100%; outline: none; }
    .rte-img.selected { outline: 2px solid #1E8DCD; }
    .rte-img-caption { font-size: 10px; color: rgba(0,0,0,0.5); line-height: 1.5; margin: 4px 0 0; text-align: center; }
    .rte-img-caption:empty::before { content: attr(data-placeholder); color: #ccc; pointer-events: none; }
    .rte-img-toolbar { display: flex; align-items: center; gap: 4px; padding: 5px 8px; background: #1a1f36; border-radius: 6px; margin-bottom: 6px; flex-wrap: wrap; }
    .rte-img-toolbar button { padding: 2px 8px; border: 1px solid rgba(255,255,255,0.3); border-radius: 3px; background: transparent; color: #fff; cursor: pointer; font-size: 12px; }
    .rte-img-toolbar button:hover { background: rgba(255,255,255,0.15); }
    .rte-img-toolbar span.lbl { font-size: 11px; color: rgba(255,255,255,0.6); }

    /* ── 썸네일 지정 버튼 ── */
    .img-thumb-btn { position: absolute; bottom: 3px; left: 3px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 3px; font-size: 10px; padding: 1px 5px; cursor: pointer; }
    .img-thumb-btn:hover { background: #1E8DCD; }

    /* ── 미리보기 버튼 ── */
    .btn-preview { padding: 0 20px; height: 38px; background: #f0f7ff; border: 1px solid #1E8DCD; border-radius: 7px; font-size: 14px; cursor: pointer; color: #1E8DCD; transition: background 0.15s; }
    .btn-preview:hover { background: #ddeeff; }

    /* ── 미리보기 모달 ── */
    .preview-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 9999; display: flex; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 40px 20px; }
    .preview-modal-inner { background: #fff; border-radius: 12px; width: 100%; max-width: 900px; padding: 48px 80px 60px; position: relative; }
    .preview-modal-close { position: absolute; top: 14px; right: 18px; background: none; border: none; font-size: 22px; cursor: pointer; color: #999; line-height: 1; }
    .preview-modal-label { font-size: 12px; color: #bbb; text-align: center; margin-bottom: 28px; }
    .preview-article-header { padding: 0 0 28px; border-bottom: 0.3px solid #1e8ccc; }
    .preview-article-title { font-family: 'Noto Sans KR', sans-serif; font-weight: 800; font-size: 23px; color: #000; line-height: 1.45; letter-spacing: 0.28px; margin-bottom: 14px; }
    .preview-article-meta { font-family: 'Noto Sans KR', sans-serif; font-weight: 700; font-size: 14px; color: rgba(0,0,0,0.5); display: flex; align-items: center; gap: 8px; }
    .preview-article-body { padding: 50px 0; font-family: 'Nanum Square', 'NanumSquare', sans-serif; font-weight: 400; font-size: 16px; color: #000; line-height: 40px; letter-spacing: 0; text-align: left; word-break: keep-all; overflow-wrap: break-word; }
    .preview-article-body p { margin-bottom: 0; }
    .preview-article-body p:last-child { margin-bottom: 0; }

    /* ── 개요 카운터 ── */
    .summary-counter { text-align: right; font-size: 12px; color: #aaa; margin-top: 3px; }
  </style>
</head>
<body>

<!-- 로그인 -->
<div class="login-overlay" id="login-overlay">
  <img class="login-deco" src="assets/admin-deco.svg" alt="">
  <div class="login-box" style="position:relative; z-index:1;">
    <div class="login-logo"><img src="assets/logo.png" alt="ecobell"></div>
    <p class="login-sub">관리자 페이지</p>
    <input id="login-user" type="text" placeholder="아이디" autocomplete="off">
    <input id="login-pass" type="password" placeholder="비밀번호" autocomplete="off">
    <div class="login-save-id">
      <input type="checkbox" id="save-id-chk">
      <label for="save-id-chk">ID 저장</label>
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">로그인</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- 관리자 패널 -->
<div class="admin-layout" id="admin-panel" style="display:none;">
  <aside class="sidebar">
    <div class="sidebar-logo"><img src="assets/logo.png" alt="ecobell"></div>
    <nav class="sidebar-nav">
      <button class="nav-btn active" onclick="switchSection('notices')" data-section="notices">
        <span class="nav-icon">📋</span>공지사항
      </button>
      <button class="nav-btn" onclick="switchSection('press')" data-section="press">
        <span class="nav-icon">📰</span>보도자료
      </button>
      <button class="nav-btn" onclick="switchSection('archive')" data-section="archive">
        <span class="nav-icon">📁</span>아카이브
      </button>
      <button class="nav-btn" onclick="switchSection('faq')" data-section="faq">
        <span class="nav-icon">❓</span>FAQ
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="preview-site-btn" onclick="showSitePreview()">🌐 웹사이트 미리보기</button>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="section-header">
      <div>
        <span class="section-title" id="section-title">공지사항</span>
        <span class="section-count" id="section-count"></span>
      </div>
      <button class="add-btn" onclick="showForm()">+ 새 항목 추가</button>
    </div>

    <!-- 추가/수정 폼 -->
    <div class="form-card" id="item-form" style="display:none;"></div>

    <!-- 리스트 -->
    <div class="card">
      <div class="item-list" id="item-list"><div class="loading">불러오는 중...</div></div>
    </div>
  </main>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
  /* ── 상태 ── */
  let authHeader = '';
  let currentSection = 'notices';
  let currentItems = [];
  let editingId = null;
  let pendingFiles = {}; // { fieldName: { base64, filename, folder } }
  let pendingImages = []; // press 이미지 배열 [{filename, base64, url}]
  let pendingAttachments = []; // notices 첨부파일 배열 [{name, base64, url}]
  let realPass = '';
  let thumbnailIdx = 0; // press 썸네일 인덱스
  let _activeRteImg = null; // 현재 선택된 RTE 이미지

  const SECTION_LABELS = { notices: '공지사항', press: '보도자료', archive: '아카이브', faq: 'FAQ' };

  /* ── 초기화 ── */
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('adminAuth');
    if (saved) {
      authHeader = saved;
      showDashboard();
    }
    // ID 저장 복원
    const savedId = localStorage.getItem('adminSavedId');
    if (savedId) {
      document.getElementById('login-user').value = savedId;
      document.getElementById('save-id-chk').checked = true;
    }
    document.getElementById('login-pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    // RTE 이미지 클릭 이벤트 (위임)
    document.addEventListener('click', function(e) {
      if (e.target.classList && e.target.classList.contains('rte-img')) {
        showRteImgToolbar(e.target);
      } else if (!e.target.closest || (!e.target.closest('#rte-img-toolbar') && !e.target.classList.contains('rte-img'))) {
        hideRteImgToolbar();
      }
    });

    // 비밀번호 마지막 글자 보이기
    (function() {
      const passEl = document.getElementById('login-pass');
      passEl.type = 'text';
      const BULLET = '●';
      let maskTimer = null;
      function render(showLast) {
        const pos = passEl.selectionStart;
        if (realPass.length === 0) { passEl.value = ''; return; }
        passEl.value = showLast
          ? BULLET.repeat(realPass.length - 1) + realPass.slice(-1)
          : BULLET.repeat(realPass.length);
        try { passEl.setSelectionRange(pos, pos); } catch(e) {}
      }
      passEl.addEventListener('input', function() {
        const raw = passEl.value;
        let newReal = '';
        for (let i = 0; i < raw.length; i++) {
          newReal += raw[i] === BULLET ? (realPass[i] || '') : raw[i];
        }
        realPass = newReal;
        clearTimeout(maskTimer);
        render(true);
        maskTimer = setTimeout(() => render(false), 800);
      });
      passEl.addEventListener('blur', function() {
        clearTimeout(maskTimer);
        render(false);
      });
    })();
  });

  /* ── 로그인 ── */
  async function doLogin() {
    const user = document.getElementById('login-user').value.trim();
    const pass = realPass;
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    if (!user || !pass) { errEl.textContent = '아이디와 비밀번호를 입력해주세요.'; return; }
    btn.disabled = true; btn.textContent = '로그인 중...';
    errEl.textContent = '';
    try {
      const res = await fetch('/api/admin-auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user, pass })
      });
      const data = await res.json();
      if (data.ok) {
        authHeader = btoa(user + ':' + pass);
        sessionStorage.setItem('adminAuth', authHeader);
        if (document.getElementById('save-id-chk').checked) {
          localStorage.setItem('adminSavedId', user);
        } else {
          localStorage.removeItem('adminSavedId');
        }
        showDashboard();
      } else {
        errEl.textContent = data.message || '로그인 실패';
      }
    } catch (e) {
      errEl.textContent = '서버 연결 오류';
    }
    btn.disabled = false; btn.textContent = '로그인';
  }

  function doLogout() {
    sessionStorage.removeItem('adminAuth');
    authHeader = '';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('login-overlay').style.display = 'flex';
    document.getElementById('login-user').value = '';
    document.getElementById('login-pass').value = '';
    realPass = '';
  }

  function showDashboard() {
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'flex';
    loadSection(currentSection);
  }

  /* ── 섹션 전환 ── */
  function switchSection(type) {
    currentSection = type;
    editingId = null;
    document.getElementById('item-form').style.display = 'none';
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.section === type));
    document.getElementById('section-title').textContent = SECTION_LABELS[type];
    loadSection(type);
  }

  /* ── 데이터 로드 ── */
  async function loadSection(type) {
    document.getElementById('item-list').innerHTML = '<div class="loading">불러오는 중...</div>';
    document.getElementById('section-count').textContent = '';
    try {
      const res = await fetch('/api/admin-data?type=' + type, {
        headers: { Authorization: 'Basic ' + authHeader }
      });
      if (res.status === 401) { doLogout(); return; }
      const data = await res.json();
      currentItems = data.items || [];
      document.getElementById('section-count').textContent = '(' + currentItems.length + '건)';
      renderList();
    } catch (e) {
      document.getElementById('item-list').innerHTML = '<div class="loading">불러오기 실패</div>';
    }
  }

  /* ── 리스트 렌더 ── */
  function renderList() {
    const el = document.getElementById('item-list');
    if (!currentItems.length) {
      el.innerHTML = '<div class="empty-state"><div style="font-size:36px;">📭</div><p>등록된 항목이 없습니다.</p></div>';
      return;
    }
    // 공지사항·보도자료: 날짜 내림차순 고정 정렬, 드래그 없음
    if (currentSection === 'notices' || currentSection === 'press') {
      currentItems.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    }
    el.innerHTML = currentItems.map((item, idx) => renderRow(item, idx)).join('');
    if (currentSection !== 'notices' && currentSection !== 'press') {
      initDragDrop();
    }
  }

  function renderRow(item, idx) {
    const isPublished = item.published !== false;
    const isPinned = !!item.pinned;
    let meta = '';
    if (currentSection === 'faq') meta = '<span class="item-tag">' + (item.category || '기타') + '</span>';
    else if (currentSection === 'press') meta = item.date || '';
    else if (currentSection === 'archive') meta = '<span class="item-tag">' + (item.type || '') + '</span>' + (item.date ? ' ' + item.date : '');
    else meta = (item.author ? `<span class="item-tag">${item.author}</span>` : '') + (item.date || '');

    const title = currentSection === 'faq' ? (item.question || '') : (item.title || '');

    const canDrag = currentSection !== 'notices' && currentSection !== 'press';
    return `<div class="item-row" ${canDrag ? 'draggable="true"' : ''} data-id="${item.id}" data-idx="${idx}">
      ${canDrag ? '<span class="drag-handle" title="순서 변경">⠿</span>' : '<span style="width:22px;flex-shrink:0;"></span>'}
      <span class="item-pin ${isPinned ? 'pinned' : ''}" title="${isPinned ? '고정 해제' : '고정'}" onclick="togglePin('${item.id}')">📌</span>
      <div class="item-info">
        <div class="item-title">${escHtml(title)}</div>
        <div class="item-meta">${meta}</div>
      </div>
      <div class="pub-toggle" onclick="togglePublish('${item.id}')" title="${isPublished ? '게시 중' : '비게시'}">
        <div class="toggle-switch ${isPublished ? 'on' : ''}"></div>
        <span style="font-size:12px;color:#aaa;width:36px;">${isPublished ? '게시' : '숨김'}</span>
      </div>
      <button class="action-btn edit" onclick="showForm('${item.id}')" title="수정">✏️</button>
      <button class="action-btn del" onclick="deleteItem('${item.id}')" title="삭제">🗑️</button>
    </div>`;
  }

  /* ── 드래그 앤 드롭 ── */
  let dragSrcIdx = null;
  function initDragDrop() {
    document.querySelectorAll('#item-list .item-row').forEach(row => {
      row.addEventListener('dragstart', e => { dragSrcIdx = +row.dataset.idx; row.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
      row.addEventListener('dragend', () => { row.classList.remove('dragging'); document.querySelectorAll('.item-row').forEach(r => r.classList.remove('drag-over')); });
      row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over'); });
      row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
      row.addEventListener('drop', async e => {
        e.preventDefault(); row.classList.remove('drag-over');
        const toIdx = +row.dataset.idx;
        if (dragSrcIdx === null || dragSrcIdx === toIdx) return;
        const items = [...currentItems];
        const [moved] = items.splice(dragSrcIdx, 1);
        items.splice(toIdx, 0, moved);
        currentItems = items;
        renderList();
        await saveReorder();
      });
    });
  }

  async function saveReorder() {
    try {
      const res = await fetch('/api/admin-data', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
        body: JSON.stringify({ type: currentSection, items: currentItems })
      });
      const d = await res.json();
      if (d.ok) showToast('순서가 저장됐습니다.');
      else showToast('순서 저장 실패: ' + d.message, true);
    } catch { showToast('순서 저장 실패', true); }
  }

  /* ── 고정/게시 토글 ── */
  async function togglePin(id) {
    const item = currentItems.find(i => i.id === id);
    if (!item) return;
    if (!item.pinned && currentSection === 'press') {
      const pinnedCount = currentItems.filter(i => i.pinned).length;
      if (pinnedCount >= 3) { showToast('보도자료는 최대 3개까지만 고정할 수 있습니다.', true); return; }
    }
    item.pinned = !item.pinned;
    await updateItem(item);
    renderList();
  }
  async function togglePublish(id) {
    const item = currentItems.find(i => i.id === id);
    if (!item) return;
    item.published = item.published === false ? true : false;
    await updateItem(item);
    renderList();
  }
  async function updateItem(item) {
    const res = await fetch('/api/admin-data', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
      body: JSON.stringify({ type: currentSection, item })
    });
    const d = await res.json();
    if (d.ok) showToast('저장됐습니다.');
    else showToast('저장 실패: ' + d.message, true);
  }

  /* ── 삭제 ── */
  async function deleteItem(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    try {
      const res = await fetch('/api/admin-data', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
        body: JSON.stringify({ type: currentSection, id })
      });
      const d = await res.json();
      if (d.ok) {
        currentItems = currentItems.filter(i => i.id !== id);
        document.getElementById('section-count').textContent = '(' + currentItems.length + '건)';
        renderList();
        showToast('삭제됐습니다.');
      } else showToast('삭제 실패: ' + d.message, true);
    } catch { showToast('삭제 실패', true); }
  }

  /* ── 폼 ── */
  function showForm(id) {
    editingId = id || null;
    pendingFiles = {};
    pendingImages = [];
    pendingAttachments = [];
    thumbnailIdx = 0;
    const item = id ? currentItems.find(i => i.id === id) : null;
    const formEl = document.getElementById('item-form');
    formEl.style.display = 'block';
    formEl.innerHTML = buildForm(item);
    formEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // RTE 내용 초기화
    const rteEl = document.getElementById('f-content');
    if (rteEl && item?.content) rteEl.innerHTML = item.content;
    // 아카이브 유형 초기화 + 상단고정 리스너
    if (currentSection === 'archive') {
      updateArchiveFields();
      const pinnedChk = document.getElementById('f-pinned');
      if (pinnedChk) pinnedChk.addEventListener('change', updateArchiveFields);
    }
    // press 이미지 초기화
    if (currentSection === 'press') {
      pendingImages = (item?.images || []).map(url => ({ url, filename: '', base64: null }));
      renderImageList();
    }
    // 첨부파일 초기화
    if (currentSection === 'notices') {
      pendingAttachments = (item?.attachments || []).map(a => ({ name: a.name, url: a.url, base64: null }));
      renderAttachList();
      // 글자크기·행간·자간·문단간 인라인 스타일 실시간 차단
      const LOCKED = ['font-size','line-height','letter-spacing','font-family','text-align'];
      function stripLockedStyles() {
        if (!rteEl) return;
        rteEl.querySelectorAll('*').forEach(el => {
          if (el.classList.contains('rte-img') || el.classList.contains('rte-img-block')) return;
          LOCKED.forEach(p => el.style.removeProperty(p));
        });
      }
      rteEl.addEventListener('input', stripLockedStyles);
      rteEl.addEventListener('paste', () => setTimeout(stripLockedStyles, 0));
    }
  }

  function hideForm() {
    editingId = null;
    pendingFiles = {};
    pendingImages = [];
    pendingAttachments = [];
    thumbnailIdx = 0;
    hideRteImgToolbar();
    document.getElementById('item-form').style.display = 'none';
  }

  const RTE_TOOLBAR = `
    <div class="rte-toolbar">
      <button type="button" onmousedown="event.preventDefault();rteCmd('bold')"><b>B</b></button>
      <div class="rte-sep"></div>
      <button type="button" onmousedown="event.preventDefault();rteInsertImage()" title="이미지 삽입">🖼 이미지</button>
    </div>`;

  const RTE_COLORS = ['#000000','#444444','#888888','#e63946','#f4722b','#f9c74f','#2d6a4f','#1E8DCD','#234B63','#6a0dad'];
  const RTE_TOOLBAR_NOTICES = `
    <div class="rte-toolbar" id="rte-toolbar-notices">
      <button type="button" onmousedown="event.preventDefault();rteCmd('bold')"><b>B</b></button>
      <button type="button" onmousedown="event.preventDefault();rteCmd('italic')"><i>I</i></button>
      <button type="button" onmousedown="event.preventDefault();rteCmd('underline')"><u>U</u></button>
      <button type="button" onmousedown="event.preventDefault();rteCmd('insertUnorderedList')">• 목록</button>
      <button type="button" onmousedown="event.preventDefault();rteCmd('insertOrderedList')">① 목록</button>
      <div class="rte-sep"></div>
      <div class="rte-color-btn" id="rte-color-btn">
        <button type="button" onmousedown="event.preventDefault();toggleColorPalette()" title="글자색">
          A<span class="rte-color-indicator" id="rte-color-indicator"></span>
        </button>
        <div class="rte-color-palette" id="rte-color-palette">
          ${RTE_COLORS.map(c => `<div class="rte-color-swatch" style="background:${c}" title="${c}" onmousedown="event.preventDefault();applyColor('${c}')"></div>`).join('')}
        </div>
      </div>
      <button type="button" onmousedown="event.preventDefault();rteLink()" title="링크 삽입">🔗 링크</button>
      <button type="button" onmousedown="event.preventDefault();rteInsertImage()" title="이미지 삽입">🖼 이미지</button>
      <div class="rte-sep"></div>
      <button type="button" onmousedown="event.preventDefault();rteCmd('removeFormat')">서식제거</button>
    </div>`;

  function buildForm(item) {
    const isEdit = !!item;
    const v = (key, def) => isEdit ? (item[key] !== undefined ? item[key] : def) : def;
    let fields = '';

    if (currentSection === 'notices') {
      const _today = new Date().toISOString().slice(0, 10);
      const _depts = ['사업부', '기술운영부', '경영지원부'];
      fields = `
        <div class="form-group full"><label class="form-label">제목 *</label><input class="form-input" id="f-title" value="${escAttr(v('title',''))}" placeholder="공지사항 제목"></div>
        <div class="form-group">
          <label class="form-label">작성자</label>
          <select class="form-select" id="f-author">
            ${_depts.map(d => `<option value="${d}" ${v('author','')===d?'selected':''}>${d}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">날짜</label><input class="form-input" type="date" id="f-date" value="${escAttr(v('date', _today))}"></div>
        <div class="form-group full">
          <label class="form-label">내용 * <span style="font-weight:400;color:#aaa;font-size:12px;">크기 16px · 자간 0 · 행간 40px · 문단 간격 0 적용됨</span></label>
          <div class="rte-wrap">${RTE_TOOLBAR_NOTICES}<div class="rte-content notice-rte" id="f-content" contenteditable="true" data-placeholder="내용을 입력하세요"></div></div>
        </div>
        <div class="form-group full">
          <label class="form-label">첨부파일</label>
          <div class="upload-area" onclick="document.getElementById('f-attach-input').click()">
            <input type="file" id="f-attach-input" accept=".pdf,.doc,.docx,.xls,.xlsx,.zip,image/*" style="display:none" multiple onchange="handleAttachments(this)">
            <div>📎 클릭하여 파일 선택 (다중 선택 가능)</div>
            <div class="upload-hint">PDF, 이미지, ZIP 등 지원</div>
          </div>
          <div id="f-attach-list" class="attach-list"></div>
        </div>`;

    } else if (currentSection === 'press') {
      fields = `
        <div class="form-group full"><label class="form-label">제목 *</label><input class="form-input" id="f-title" value="${escAttr(v('title',''))}" placeholder="보도자료 제목"></div>
        <div class="form-group"><label class="form-label">날짜</label><input class="form-input" type="date" id="f-date" value="${escAttr(v('date',''))}"></div>
        <div class="form-group full">
          <label class="form-label">내용 *</label>
          <div class="rte-wrap">${RTE_TOOLBAR}<div class="rte-content" id="f-content" contenteditable="true" data-placeholder="내용을 입력하세요"></div></div>
        </div>
        <div class="form-group full">
          <label class="form-label">이미지 <span style="font-weight:400;color:#aaa;font-size:12px;">★ 클릭으로 썸네일 지정</span></label>
          <div class="image-list" id="f-image-list"></div>
        </div>`;

    } else if (currentSection === 'archive') {
      const archType = v('type','intro');
      fields = `
        <div class="form-group full" id="f-title-group"><label class="form-label">제목 *</label><input class="form-input" id="f-title" value="${escAttr(v('title',''))}" placeholder="자료 제목"></div>
        <div class="form-group"><label class="form-label">유형 *</label>
          <select class="form-select" id="f-type" onchange="updateArchiveFields()">
            ${['intro','catalog','ir','ci'].map(t => `<option value="${t}" ${archType===t?'selected':''}>${{intro:'기업소개서',catalog:'카탈로그/지명원',ir:'IR',ci:'CI'}[t]}</option>`).join('')}
          </select>
        </div>
        <div class="form-group" id="f-date-group"><label class="form-label">날짜</label><input class="form-input" type="date" id="f-date" value="${escAttr(v('date',''))}"></div>
        <div class="form-group" id="f-file-group">
          <label class="form-label" id="f-file-label">파일</label>
          <div class="upload-area" onclick="document.getElementById('f-file-input').click()">
            <input type="file" id="f-file-input" accept=".pdf,image/*,.zip" style="display:none" onchange="handleFile(this,'file','archive')">
            <div id="f-file-hint-icon">📎 클릭하여 파일 선택</div>
            <div class="upload-hint" id="f-file-hint">PDF, 이미지 지원</div>
            <div class="upload-filename" id="f-file-name">${v('file','') ? '기존 파일 있음' : ''}</div>
          </div>
        </div>
        <div class="form-group" id="f-thumb-group">
          <label class="form-label">썸네일 이미지</label>
          <div class="upload-area" onclick="document.getElementById('f-thumb-input').click()">
            <input type="file" id="f-thumb-input" accept="image/*" style="display:none" onchange="handleFile(this,'thumbnail','archive')">
            <div>🖼 클릭하여 썸네일 선택</div>
            <div class="upload-hint">JPG, PNG 지원</div>
            ${v('thumbnail','') ? `<img src="${escAttr(v('thumbnail',''))}" class="upload-preview" style="display:block;" id="f-thumb-preview">` : '<img class="upload-preview" id="f-thumb-preview">'}
            <div class="upload-filename" id="f-thumb-name">${v('thumbnail','') ? '기존 썸네일 있음' : ''}</div>
          </div>
        </div>
        <div class="form-group full" id="f-summary-group" style="display:none;">
          <label class="form-label">개요 <span style="font-weight:400;color:#aaa;font-size:12px;">공백포함 최대 150자 (상단 고정 시 표시)</span></label>
          <textarea class="form-textarea" id="f-summary" rows="3" maxlength="150" placeholder="개요를 입력하세요 (공백포함 150자 이내)" oninput="document.getElementById('f-summary-count').textContent=this.value.length">${escHtml(v('summary',''))}</textarea>
          <div class="summary-counter"><span id="f-summary-count">${String(v('summary','')).length}</span>/150</div>
        </div>`;

    } else if (currentSection === 'faq') {
      const _faqCats = ['ecoASSET','E-ASSET','ecoNODE','신재생에너지','기타'];
      const _selCats = String(v('category','')).split(',').map(s => s.trim()).filter(Boolean);
      fields = `
        <div class="form-group full"><label class="form-label">카테고리 * <span style="font-weight:400;color:#aaa;font-size:12px;">복수 선택 가능</span></label>
          <div class="form-check-row" style="flex-wrap:wrap;gap:8px 20px;margin-top:4px;">
            ${_faqCats.map(c => `<label class="form-check"><input type="checkbox" class="f-cat-check" value="${c}" ${_selCats.includes(c)?'checked':''}> ${c}</label>`).join('')}
          </div>
        </div>
        <div class="form-group full"><label class="form-label">질문 *</label><input class="form-input" id="f-question" value="${escAttr(v('question',''))}" placeholder="자주 묻는 질문"></div>
        <div class="form-group full"><label class="form-label">답변 *</label><textarea class="form-textarea" id="f-answer" rows="6" placeholder="답변 내용">${escHtml(v('answer',''))}</textarea></div>`;
    }

    return `
      <div class="form-title">${isEdit ? '항목 수정' : '새 항목 추가'}</div>
      <div class="form-grid">${fields}</div>
      <div class="form-grid" style="margin-top:14px;">
        <div class="form-group">
          <label class="form-label">옵션</label>
          <div class="form-check-row">
            ${currentSection !== 'faq' ? `<label class="form-check"><input type="checkbox" id="f-pinned" ${v('pinned',false)?'checked':''}> 상단 고정</label>` : ''}
            <label class="form-check"><input type="checkbox" id="f-published" ${v('published',true)!==false?'checked':''}> 게시</label>
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="hideForm()">취소</button>
        <button class="btn-save" id="save-btn" onclick="saveItem()">저장</button>
      </div>`;
  }

  /* ── 아카이브 유형 변경 ── */
  function updateArchiveFields() {
    const t = document.getElementById('f-type')?.value;
    if (!t) return;
    const isCi = t === 'ci';
    const isIr = t === 'ir';
    const titleGroup = document.getElementById('f-title-group');
    const dateGroup = document.getElementById('f-date-group');
    const thumbGroup = document.getElementById('f-thumb-group');
    const fileLabel = document.getElementById('f-file-label');
    const fileInput = document.getElementById('f-file-input');
    const fileHintIcon = document.getElementById('f-file-hint-icon');
    const fileHint = document.getElementById('f-file-hint');
    if (titleGroup) titleGroup.style.display = isCi ? 'none' : '';
    if (dateGroup) dateGroup.style.display = isCi ? 'none' : '';
    if (thumbGroup) thumbGroup.style.display = (isCi || isIr) ? 'none' : '';
    if (fileLabel) fileLabel.textContent = isCi ? 'ZIP 파일 *' : '파일 (PDF/이미지)';
    if (fileInput) fileInput.accept = isCi ? '.zip' : '.pdf,image/*,.zip';
    if (fileHintIcon) fileHintIcon.textContent = isCi ? '🗜 ZIP 파일 선택' : '📎 클릭하여 파일 선택';
    if (fileHint) fileHint.textContent = isCi ? 'ZIP 파일만 지원' : 'PDF, 이미지 지원';
    // 개요 필드: 카탈로그/기업소개서 + 상단고정 시 표시
    const isPinned = document.getElementById('f-pinned')?.checked;
    const summaryGroup = document.getElementById('f-summary-group');
    if (summaryGroup) {
      summaryGroup.style.display = (isPinned && (t === 'catalog' || t === 'intro')) ? '' : 'none';
    }
  }

  /* ── 리치 텍스트 에디터 ── */
  function rteCmd(cmd) {
    const el = document.getElementById('f-content');
    if (el) el.focus();
    document.execCommand(cmd, false, null);
  }

  let _rteSavedRange = null;
  function rteSaveSelection() {
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) _rteSavedRange = sel.getRangeAt(0).cloneRange();
  }
  function rteRestoreSelection() {
    if (!_rteSavedRange) return;
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(_rteSavedRange);
  }

  function rteLink() {
    const el = document.getElementById('f-content');
    if (!el) return;
    const sel = window.getSelection();
    const hasSelection = sel && sel.toString().trim().length > 0;
    rteSaveSelection();
    const url = window.prompt('링크 URL을 입력하세요', 'https://');
    if (!url) return;
    el.focus();
    rteRestoreSelection();
    if (hasSelection) {
      document.execCommand('createLink', false, url);
      // 새 탭으로 열기
      el.querySelectorAll('a').forEach(a => { if (!a.target) { a.target = '_blank'; a.rel = 'noopener'; } });
    } else {
      const a = document.createElement('a');
      a.href = url; a.target = '_blank'; a.rel = 'noopener'; a.textContent = url;
      document.execCommand('insertHTML', false, a.outerHTML);
    }
  }

  function toggleColorPalette() {
    rteSaveSelection();
    const palette = document.getElementById('rte-color-palette');
    if (!palette) return;
    const isOpen = palette.classList.contains('open');
    palette.classList.toggle('open', !isOpen);
    if (!isOpen) {
      setTimeout(() => {
        const close = e => {
          if (!document.getElementById('rte-color-btn')?.contains(e.target)) {
            palette.classList.remove('open');
            document.removeEventListener('mousedown', close);
          }
        };
        document.addEventListener('mousedown', close);
      }, 0);
    }
  }

  function applyColor(color) {
    const el = document.getElementById('f-content');
    if (!el) return;
    el.focus();
    rteRestoreSelection();
    document.execCommand('foreColor', false, color);
    const indicator = document.getElementById('rte-color-indicator');
    if (indicator) indicator.style.background = color;
    const palette = document.getElementById('rte-color-palette');
    if (palette) palette.classList.remove('open');
  }

  /* ── 키워드 태그 ── */
  function renderKeywords(kws) {
    const wrap = document.getElementById('f-keywords-wrap');
    const input = document.getElementById('f-kw-input');
    if (!wrap || !input) return;
    wrap.querySelectorAll('.tag-item').forEach(t => t.remove());
    kws.forEach((kw, i) => {
      const tag = document.createElement('span');
      tag.className = 'tag-item';
      tag.innerHTML = escHtml(kw) + `<button type="button" onclick="removeKeyword(${i})">×</button>`;
      wrap.insertBefore(tag, input);
    });
    document.getElementById('f-keywords').value = JSON.stringify(kws);
  }
  function initKeywordInput() {
    const input = document.getElementById('f-kw-input');
    if (!input) return;
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const val = input.value.replace(/,/g,'').trim();
        if (!val) return;
        const hidden = document.getElementById('f-keywords');
        const kws = JSON.parse(hidden.value || '[]');
        if (!kws.includes(val)) { kws.push(val); renderKeywords(kws); }
        input.value = '';
      }
    });
  }
  function removeKeyword(idx) {
    const hidden = document.getElementById('f-keywords');
    const kws = JSON.parse(hidden.value || '[]');
    kws.splice(idx, 1);
    renderKeywords(kws);
  }

  /* ── 다중 이미지 (press) ── */
  function renderImageList() {
    const list = document.getElementById('f-image-list');
    if (!list) return;
    list.innerHTML = pendingImages.map((img, i) => `
      <div class="image-item">
        <img src="${img.url || (img.base64 ? 'data:image/*;base64,'+img.base64 : '')}" alt="">
        ${i === thumbnailIdx
          ? '<span class="img-badge">썸네일</span>'
          : `<button class="img-thumb-btn" type="button" onclick="setThumbnail(${i})" title="썸네일로 지정">★</button>`}
        <button class="img-del" type="button" onclick="removeImage(${i})">×</button>
      </div>`).join('') +
      `<button class="image-add-btn" type="button" onclick="document.getElementById('f-img-input').click()">
        <input type="file" id="f-img-input" accept="image/*" multiple style="display:none" onchange="handleImages(this)">
        +<span>이미지 추가</span>
      </button>`;
  }
  function setThumbnail(idx) {
    thumbnailIdx = idx;
    renderImageList();
  }
  async function handleImages(input) {
    const files = Array.from(input.files);
    if (!files.length) return;
    input.value = '';
    showToast('이미지 업로드 중...');
    try {
      const urls = await Promise.all(files.map(f => uploadImageNow(f, 'press')));
      const el = document.getElementById('f-content');
      // 이미지 목록에 추가
      urls.forEach((url, i) => pendingImages.push({ filename: files[i].name, url, base64: null }));
      renderImageList();
      // 내용 에디터 끝에 삽입 (보도자료)
      if (el && currentSection === 'press') {
        el.focus();
        const range = document.createRange();
        range.selectNodeContents(el);
        range.collapse(false);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        urls.forEach(url => document.execCommand('insertHTML', false, rteImgHtml(url)));
      }
    } catch (err) {
      showToast('이미지 업로드 실패: ' + err.message, true);
    }
  }
  function removeImage(idx) {
    pendingImages.splice(idx, 1);
    renderImageList();
  }

  /* ── 다중 첨부파일 (notices) ── */
  function renderAttachList() {
    const list = document.getElementById('f-attach-list');
    if (!list) return;
    list.innerHTML = pendingAttachments.map((a, i) => `
      <div class="attach-item">
        <span>📄</span>
        <span class="attach-name">${escHtml(a.name)}</span>
        <button class="attach-del" type="button" onclick="removeAttachment(${i})">×</button>
      </div>`).join('');
  }
  function handleAttachments(input) {
    const files = Array.from(input.files);
    let loaded = 0;
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        const base64 = e.target.result.split(',')[1];
        pendingAttachments.push({ name: file.name, base64, url: null });
        loaded++;
        if (loaded === files.length) renderAttachList();
      };
      reader.readAsDataURL(file);
    });
    input.value = '';
  }
  function removeAttachment(idx) {
    pendingAttachments.splice(idx, 1);
    renderAttachList();
  }

  /* ── 파일 처리 ── */
  function handleFile(input, fieldKey, folder) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const base64 = e.target.result.split(',')[1];
      pendingFiles[fieldKey] = { base64, filename: file.name, folder };
      // 이미지 프리뷰
      const prevEl = document.getElementById('f-' + fieldKey + '-preview');
      if (prevEl && file.type.startsWith('image/')) {
        prevEl.src = e.target.result;
        prevEl.style.display = 'block';
      }
      const nameEl = document.getElementById('f-' + fieldKey + '-name');
      if (nameEl) { nameEl.textContent = file.name; nameEl.style.display = 'block'; }
    };
    reader.readAsDataURL(file);
  }

  /* ── 저장 ── */
  async function saveItem() {
    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = '저장 중...';

    try {
      // 단일 파일 업로드
      const uploadedUrls = {};
      for (const [key, f] of Object.entries(pendingFiles)) {
        btn.textContent = '파일 업로드 중...';
        const res = await fetch('/api/admin-upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
          body: JSON.stringify({ filename: f.filename, content: f.base64, folder: f.folder })
        });
        const d = await res.json();
        if (!d.ok) throw new Error('파일 업로드 실패: ' + d.message);
        uploadedUrls[key] = d.url;
      }

      // 다중 이미지 업로드 (press)
      const uploadedImages = [];
      for (const img of pendingImages) {
        if (img.url && !img.base64) { uploadedImages.push(img.url); continue; }
        btn.textContent = '이미지 업로드 중...';
        const res = await fetch('/api/admin-upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
          body: JSON.stringify({ filename: img.filename, content: img.base64, folder: 'press' })
        });
        const d = await res.json();
        if (!d.ok) throw new Error('이미지 업로드 실패: ' + d.message);
        uploadedImages.push(d.url);
      }

      // 다중 첨부파일 업로드 (notices)
      const uploadedAttachments = [];
      for (const att of pendingAttachments) {
        if (att.url && !att.base64) { uploadedAttachments.push({ name: att.name, url: att.url }); continue; }
        btn.textContent = '첨부파일 업로드 중...';
        const res = await fetch('/api/admin-upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
          body: JSON.stringify({ filename: att.name, content: att.base64, folder: 'notices' })
        });
        const d = await res.json();
        if (!d.ok) throw new Error('첨부파일 업로드 실패: ' + d.message);
        uploadedAttachments.push({ name: att.name, url: d.url });
      }

      // RTE 내 잔여 base64 이미지 → GitHub URL 교체 (notices/press 공통)
      if (currentSection === 'notices' || currentSection === 'press') {
        const rteEl = document.getElementById('f-content');
        if (rteEl) {
          const imgs = rteEl.querySelectorAll('img[src^="data:"]');
          if (imgs.length) {
            btn.textContent = '이미지 업로드 중...';
            await Promise.all(Array.from(imgs).map(async img => {
              try {
                const dataUrl = img.src;
                const base64 = dataUrl.split(',')[1];
                const mime = (dataUrl.match(/:(.*?);/) || [])[1] || 'image/jpeg';
                const ext = mime.split('/')[1] || 'jpg';
                const res = await fetch('/api/admin-upload', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
                  body: JSON.stringify({ filename: 'image-' + Date.now() + '.' + ext, content: base64, folder: currentSection })
                });
                const d = await res.json();
                if (d.ok) img.src = d.url;
              } catch (_) {}
            }));
          }
        }
      }

      btn.textContent = '저장 중...';

      // 폼 데이터 수집
      const item = collectFormData(uploadedUrls, uploadedImages, uploadedAttachments);

      if (editingId) {
        // 수정
        const existing = currentItems.find(i => i.id === editingId);
        const merged = { ...existing, ...item, id: editingId };
        const res = await fetch('/api/admin-data', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
          body: JSON.stringify({ type: currentSection, item: merged })
        });
        const d = await res.json();
        if (!d.ok) throw new Error(d.message);
        const idx = currentItems.findIndex(i => i.id === editingId);
        if (idx !== -1) currentItems[idx] = merged;
        showToast('수정됐습니다.');
      } else {
        // 추가
        const res = await fetch('/api/admin-data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
          body: JSON.stringify({ type: currentSection, item })
        });
        const d = await res.json();
        if (!d.ok) throw new Error(d.message);
        currentItems.unshift(d.item);
        document.getElementById('section-count').textContent = '(' + currentItems.length + '건)';
        showToast('추가됐습니다.');
      }

      hideForm();
      renderList();
    } catch (err) {
      showToast(err.message || '저장 실패', true);
    }
    btn.disabled = false; btn.textContent = '저장';
  }

  /* 공지사항 본문: 크기·자간·행간·정렬만 제거, 굵기·색상 등은 유지 */
  function sanitizeNoticeContent(html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    div.querySelectorAll('*').forEach(el => {
      if (el.classList.contains('rte-img') || el.classList.contains('rte-img-block')) return;
      el.style.removeProperty('font-size');
      el.style.removeProperty('line-height');
      el.style.removeProperty('letter-spacing');
      el.style.removeProperty('font-family');
      el.style.removeProperty('text-align');
      // font-weight, color, text-decoration, font-style은 유지 (굵기·색상·밑줄·기울기 반영)
    });
    return div.innerHTML;
  }

  function collectFormData(uploadedUrls, uploadedImages, uploadedAttachments) {
    const get = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
    const chk = id => { const el = document.getElementById(id); return el ? el.checked : false; };
    const rte = id => { const el = document.getElementById(id); return el ? el.innerHTML : ''; };
    const base = { pinned: chk('f-pinned'), published: chk('f-published') };

    if (currentSection === 'notices') {
      return { ...base, title: get('f-title'), content: sanitizeNoticeContent(rte('f-content')), date: get('f-date'), author: get('f-author'), attachments: uploadedAttachments };
    }
    if (currentSection === 'press') {
      // 선택된 썸네일을 첫 번째로 이동
      const reordered = [...uploadedImages];
      if (thumbnailIdx > 0 && thumbnailIdx < reordered.length) {
        const [thumb] = reordered.splice(thumbnailIdx, 1);
        reordered.unshift(thumb);
      }
      return { ...base, title: get('f-title'), content: rte('f-content'), date: get('f-date'), images: reordered };
    }
    if (currentSection === 'archive') {
      const existing = editingId ? (currentItems.find(i => i.id === editingId) || {}) : {};
      const archType = get('f-type');
      const isCi = archType === 'ci';
      const isIr = archType === 'ir';
      const isPinned = document.getElementById('f-pinned')?.checked;
      return {
        ...base,
        title: isCi ? 'CI 파일' : get('f-title'),
        type: archType,
        date: isCi ? '' : get('f-date'),
        file: uploadedUrls.file || existing.file || '',
        thumbnail: (isCi || isIr) ? '' : (uploadedUrls.thumbnail || existing.thumbnail || ''),
        summary: (isPinned && (archType === 'catalog' || archType === 'intro')) ? get('f-summary') : ''
      };
    }
    if (currentSection === 'faq') {
      const catChecks = document.querySelectorAll('.f-cat-check:checked');
      const category = Array.from(catChecks).map(c => c.value).join(',');
      return { ...base, category, question: get('f-question'), answer: get('f-answer') };
    }
    return base;
  }

  /* ── RTE 이미지 블록 HTML 생성 ── */
  function rteImgHtml(src) {
    return `<div class="rte-img-block" style="display:block;text-align:center;margin:15px 0;"><img src="${src}" class="rte-img" style="width:60%;max-width:100%;display:inline-block;"><p class="rte-img-caption" data-placeholder="▲ 캡션을 입력하세요 (선택)">▲ </p></div><p><br></p>`;
  }

  /* ── GitHub에 이미지 즉시 업로드 → URL 반환 ── */
  async function uploadImageNow(file, folder) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = async e => {
        const base64 = e.target.result.split(',')[1];
        try {
          const res = await fetch('/api/admin-upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
            body: JSON.stringify({ filename: file.name, content: base64, folder: folder || currentSection })
          });
          const d = await res.json();
          if (!d.ok) throw new Error(d.message || '업로드 실패');
          resolve(d.url);
        } catch (err) { reject(err); }
      };
      reader.onerror = () => reject(new Error('파일 읽기 실패'));
      reader.readAsDataURL(file);
    });
  }

  /* ── RTE 이미지 삽입 ── */
  function rteInsertImage() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async function() {
      const file = input.files[0];
      if (!file) return;
      const el = document.getElementById('f-content');
      if (!el) return;
      // 로딩 플레이스홀더 삽입
      const pid = 'rte-loading-' + Date.now();
      el.focus();
      document.execCommand('insertHTML', false,
        `<span id="${pid}" style="display:inline-block;padding:2px 10px;background:#eef6fb;color:#1E8DCD;border-radius:4px;font-size:12px;">⏳ 업로드 중...</span>`);
      try {
        const url = await uploadImageNow(file);
        const placeholder = document.getElementById(pid);
        if (placeholder) {
          const tmp = document.createElement('div');
          tmp.innerHTML = rteImgHtml(url);
          placeholder.replaceWith(tmp.firstChild);
        }
        // 보도자료: 이미지 목록에도 동기화
        if (currentSection === 'press') {
          pendingImages.push({ filename: file.name, url, base64: null });
          renderImageList();
        }
      } catch (err) {
        const placeholder = document.getElementById(pid);
        if (placeholder) placeholder.remove();
        showToast('이미지 업로드 실패: ' + err.message, true);
      }
    };
    input.click();
  }

  function showRteImgToolbar(img) {
    hideRteImgToolbar();
    _activeRteImg = img;
    img.classList.add('selected');
    const toolbar = document.createElement('div');
    toolbar.id = 'rte-img-toolbar';
    toolbar.className = 'rte-img-toolbar';
    toolbar.innerHTML = `
      <span class="lbl">크기:</span>
      <button type="button" onmousedown="event.preventDefault();setRteImgWidth(25)">25%</button>
      <button type="button" onmousedown="event.preventDefault();setRteImgWidth(50)">50%</button>
      <button type="button" onmousedown="event.preventDefault();setRteImgWidth(75)">75%</button>
      <button type="button" onmousedown="event.preventDefault();setRteImgWidth(100)">100%</button>`;
    const block = img.closest('.rte-img-block') || img.parentNode;
    block.insertBefore(toolbar, img);
  }

  function hideRteImgToolbar() {
    const t = document.getElementById('rte-img-toolbar');
    if (t) t.remove();
    if (_activeRteImg) { _activeRteImg.classList.remove('selected'); _activeRteImg = null; }
  }

  function setRteImgWidth(pct) {
    if (_activeRteImg) _activeRteImg.style.width = pct + '%';
  }

  /* ── 미리보기 ── */
  function showPreview() {
    const title = document.getElementById('f-title')?.value || '';
    const author = document.getElementById('f-author')?.value || '';
    const date = (document.getElementById('f-date')?.value || '').replace(/-/g, '.');
    const contentEl = document.getElementById('f-content');
    const content = contentEl ? contentEl.innerHTML : '';

    const modal = document.createElement('div');
    modal.className = 'preview-modal';
    modal.innerHTML = `
      <div class="preview-modal-inner">
        <button class="preview-modal-close" onclick="this.closest('.preview-modal').remove()">×</button>
        <p class="preview-modal-label">미리보기 (실제 게시 화면과 유사)</p>
        <hr style="border:none;border-top:1px solid #000;margin-bottom:0;">
        <div class="preview-article-header">
          <h1 class="preview-article-title">${escHtml(title)}</h1>
          <div class="preview-article-meta">
            ${author ? `<span>${escHtml(author)}</span><span>|</span>` : ''}
            <span>${date}</span>
          </div>
        </div>
        <div class="preview-article-body">${content}</div>
      </div>`;
    modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
    document.body.appendChild(modal);
  }

  /* ── 웹사이트 미리보기 ── */
  function showSitePreview() {
    const overlay = document.createElement('div');
    overlay.className = 'site-preview-overlay';
    overlay.innerHTML = `
      <p class="site-preview-notice">⚠ 게시 후 실제 반영까지 몇 분이 소요될 수 있습니다.</p>
      <div class="site-preview-bar">
        <span>🌐 웹사이트 미리보기</span>
        <button class="site-preview-close" onclick="this.closest('.site-preview-overlay').remove()">✕ 닫기</button>
      </div>
      <iframe class="site-preview-frame" src="https://ecobellwebsite.vercel.app" allowfullscreen></iframe>`;
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
  }

  /* ── 유틸 ── */
  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

  function showToast(msg, isError) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast' + (isError ? ' error' : '');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }
</script>
  <script src="assets/header-scroll.js"></script>
</body>
</html>
