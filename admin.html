  function onArchiveTypeChange(val) {
    const prevIsCi = archiveTab === 'ci';
    const newIsCi = val === 'ci';
    // If switching between CI and non-CI, rebuild the form (layout changes significantly)
    if (prevIsCi !== newIsCi) {
      const yearVal = document.getElementById('f-year')?.value || '';
      const periodVal = document.getElementById('f-period')?.value || '';
      const summaryVal = document.getElementById('f-summary')?.value || '';
      archiveTab = val;
      const formEl = document.getElementById('item-form');
      const item = editingId ? currentItems.find(i => i.id === editingId) : null;
      formEl.innerHTML = buildForm(item);
      const yearEl = document.getElementById('f-year');
      if (yearEl && yearVal) yearEl.value = yearVal;
      const typeEl = document.getElementById('f-type');
      if (typeEl) typeEl.value = val;
      const periodEl = document.getElementById('f-period');
      if (periodEl && periodVal) periodEl.value = periodVal;
      const summaryEl = document.getElementById('f-summary');
      if (summaryEl && summaryVal) { summaryEl.value = summaryVal; updateSummaryCount(summaryEl); }
      updateArchiveFields();
      const pinnedChk = document.getElementById('f-pinned');
      if (pinnedChk) pinnedChk.addEventListener('change', updateArchiveFields);
      return;
    }
    // Same CI/non-CI category: just toggle visibility
    const si = document.getElementById('f-summary-inner');
    if (si) si.style.display = ['intro','catalog'].includes(val) ? 'flex' : 'none';
    const eg = document.getElementById('f-file-eng-group');
    if (eg) eg.style.display = val === 'ci' ? 'none' : '';
  }

  function updateSummaryCount(el) {
    const cnt = document.getElementById('f-summary-count');
    if (cnt) {
      const len = el.value.length;
      cnt.textContent = len + '/110';
      cnt.style.color = (len >= 60 && len <= 110) ? '#1E8DCD' : (len > 110 ? '#e63946' : '#aaa');
    }
  }

  /* ── 아카이브 탭 드롭 ── */
  function archiveTabDrop(e, type) {
    e.preventDefault();
    const file = e.dataTransfer?.files?.[0];
    if (!file) return;
    archiveTab = type;
    renderList();
    showForm();
    // showForm이 pendingFiles 초기화 후라 setTimeout으로 DOM 준비 후 주입
    setTimeout(() => handleArchiveFile({ files: [file] }), 50);
  }

  /* ── 아카이브 폼 핀 토글 ── */
  function toggleArchiveFormPin() {
    const chk = document.getElementById('f-pinned');
    const btn = document.getElementById('f-pinned-btn');
    if (!chk || !btn) return;
    chk.checked = !chk.checked;
    btn.classList.toggle('pinned', chk.checked);
  }

  /* ── 캡션 서식 토글 (현재 커서 위치의 블록 요소에 적용/해제) ── */
  function rteApplyCaption() {
    const el = document.getElementById('f-content');
    if (!el) return;
    el.focus();
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;
    let node = sel.getRangeAt(0).commonAncestorContainer;
    if (node.nodeType === 3) node = node.parentNode;
    while (node && node !== el && !['P','DIV','H1','H2','H3','LI','BLOCKQUOTE'].includes(node.nodeName)) {
      node = node.parentNode;
    }
    if (!node || node === el) return;
    node.classList.toggle('rte-caption-style');
  }

  /* ── 리치 텍스트 에디터 ── */
  function rteCmd(cmd) {
    const el = document.getElementById('f-content');
    if (el) el.focus();
    document.execCommand(cmd, false, null);
  }

  let _rteSavedRange = null;
  function rteSaveSelection() {
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) _rteSavedRange = sel.getRangeAt(0).cloneRange();
  }
  function rteRestoreSelection() {
    if (!_rteSavedRange) return;
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(_rteSavedRange);
  }

  function rteLink() {
    const el = document.getElementById('f-content');
    if (!el) return;
    const sel = window.getSelection();
    const hasSelection = sel && sel.toString().trim().length > 0;
    rteSaveSelection();
    const url = window.prompt('링크 URL을 입력하세요', 'https://');
    if (!url) return;
    el.focus();
    rteRestoreSelection();
    if (hasSelection) {
      document.execCommand('createLink', false, url);
      // 새 탭으로 열기
      el.querySelectorAll('a').forEach(a => { if (!a.target) { a.target = '_blank'; a.rel = 'noopener'; } });
    } else {
      const a = document.createElement('a');
      a.href = url; a.target = '_blank'; a.rel = 'noopener'; a.textContent = url;
      document.execCommand('insertHTML', false, a.outerHTML);
    }
  }

  function toggleColorPalette() {
    rteSaveSelection();
    const palette = document.getElementById('rte-color-palette');
    if (!palette) return;
    const isOpen = palette.classList.contains('open');
    palette.classList.toggle('open', !isOpen);
    if (!isOpen) {
      setTimeout(() => {
        const close = e => {
          if (!document.getElementById('rte-color-btn')?.contains(e.target)) {
            palette.classList.remove('open');
            document.removeEventListener('mousedown', close);
          }
        };
        document.addEventListener('mousedown', close);
      }, 0);
    }
  }

  function applyColor(color) {
    const el = document.getElementById('f-content');
    if (!el) return;
    el.focus();
    rteRestoreSelection();
    document.execCommand('foreColor', false, color);
    const indicator = document.getElementById('rte-color-indicator');
    if (indicator) indicator.style.background = color;
    const palette = document.getElementById('rte-color-palette');
    if (palette) palette.classList.remove('open');
  }

  /* ── 키워드 태그 ── */
  function renderKeywords(kws) {
    const wrap = document.getElementById('f-keywords-wrap');
    const input = document.getElementById('f-kw-input');
    if (!wrap || !input) return;
    wrap.querySelectorAll('.tag-item').forEach(t => t.remove());
    kws.forEach((kw, i) => {
      const tag = document.createElement('span');
      tag.className = 'tag-item';
      tag.innerHTML = escHtml(kw) + `<button type="button" onclick="removeKeyword(${i})">×</button>`;
      wrap.insertBefore(tag, input);
    });
    document.getElementById('f-keywords').value = JSON.stringify(kws);
  }
  function initKeywordInput() {
    const input = document.getElementById('f-kw-input');
    if (!input) return;
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const val = input.value.replace(/,/g,'').trim();
        if (!val) return;
        const hidden = document.getElementById('f-keywords');
        const kws = JSON.parse(hidden.value || '[]');
        if (!kws.includes(val)) { kws.push(val); renderKeywords(kws); }
        input.value = '';
      }
    });
  }
  function removeKeyword(idx) {
    const hidden = document.getElementById('f-keywords');
    const kws = JSON.parse(hidden.value || '[]');
    kws.splice(idx, 1);
    renderKeywords(kws);
  }

  /* ── 다중 이미지 (press) ── */
  function renderImageList() {
    const list = document.getElementById('f-image-list');
    if (!list) return;
    list.innerHTML = pendingImages.map((img, i) => `
      <div class="image-item">
        <img src="${img.url || (img.base64 ? 'data:image/*;base64,'+img.base64 : '')}" alt="">
        ${i === thumbnailIdx
          ? '<span class="img-badge">썸네일</span>'
          : `<button class="img-thumb-btn" type="button" onclick="setThumbnail(${i})" title="썸네일로 지정">★</button>`}
        <button class="img-del" type="button" onclick="removeImage(${i})">×</button>
      </div>`).join('') +
      `<button class="image-add-btn" type="button" onclick="document.getElementById('f-img-input').click()">
        <input type="file" id="f-img-input" accept="image/*" multiple style="display:none" onchange="handleImages(this)">
        +<span>이미지 추가</span>
      </button>`;
  }
  function setThumbnail(idx) {
    thumbnailIdx = idx;
    renderImageList();
  }
  async function handleImages(input) {
    const files = Array.from(input.files);
    if (!files.length) return;
    input.value = '';
    showToast('이미지 업로드 중...');
    try {
      const urls = await Promise.all(files.map(f => uploadImageNow(f, 'press')));
      const el = document.getElementById('f-content');
      // 이미지 목록에 추가
      urls.forEach((url, i) => pendingImages.push({ filename: files[i].name, url, base64: null }));
      renderImageList();
      // 내용 에디터 끝에 삽입 (보도자료)
      if (el && currentSection === 'press') {
        el.focus();
        const range = document.createRange();
        range.selectNodeContents(el);
        range.collapse(false);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        urls.forEach(url => document.execCommand('insertHTML', false, rteImgHtml(url)));
      }
    } catch (err) {
      showToast('이미지 업로드 실패: ' + err.message, true);
    }
  }
  function removeImage(idx) {
    pendingImages.splice(idx, 1);
    renderImageList();
  }

  /* ── 다중 첨부파일 (notices) ── */
  function renderAttachList() {
    const list = document.getElementById('f-attach-list');
    if (!list) return;
    list.innerHTML = pendingAttachments.map((a, i) => `
      <div class="attach-item">
        <span>📄</span>
        <span class="attach-name">${escHtml(a.name)}</span>
        <button class="attach-del" type="button" onclick="removeAttachment(${i})">×</button>
      </div>`).join('');
  }
  function handleAttachments(input) {
    const files = Array.from(input.files);
    let loaded = 0;
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        const base64 = e.target.result.split(',')[1];
        pendingAttachments.push({ name: file.name, base64, url: null });
        loaded++;
        if (loaded === files.length) renderAttachList();
      };
      reader.readAsDataURL(file);
    });
    input.value = '';
  }
  function removeAttachment(idx) {
    pendingAttachments.splice(idx, 1);
    renderAttachList();
  }

  /* ── 파일 처리 ── */
  function handleFile(input, fieldKey, folder) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const base64 = e.target.result.split(',')[1];
      pendingFiles[fieldKey] = { base64, filename: file.name, folder };
      // 이미지 프리뷰
      const prevEl = document.getElementById('f-' + fieldKey + '-preview');
      if (prevEl && file.type.startsWith('image/')) {
        prevEl.src = e.target.result;
        prevEl.style.display = 'block';
      }
      const nameEl = document.getElementById('f-' + fieldKey + '-name');
      if (nameEl) { nameEl.textContent = file.name; nameEl.style.display = 'block'; }
    };
    reader.readAsDataURL(file);
  }

  /* ── 저장 ── */
  async function saveItem() {
    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = '저장 중...';

    // 아카이브 필수 필드 검증
    if (currentSection === 'archive') {
      const existing = editingId ? (currentItems.find(i => i.id === editingId) || {}) : {};
      const archType = document.getElementById('f-type')?.value || '';
      const year = document.getElementById('f-year')?.value?.trim() || '';
      const hasPdf = pendingFiles['file'] || (!_archiveClearedFiles.file && existing.file);
      const hasThumb = pendingFiles['thumbnail'] || (!_archiveClearedFiles.thumbnail && existing.thumbnail);

      if (!year) {
        showToast('연도를 입력하세요.'); btn.disabled = false; btn.textContent = '저장'; return;
      }
      if (!hasPdf) {
        showToast('PDF 파일을 업로드하세요.'); btn.disabled = false; btn.textContent = '저장'; return;
      }
      if (archType !== 'ci' && !hasThumb) {
        const area = document.getElementById('f-thumb-area');
        if (area) { area.style.borderColor = '#e63946'; area.style.color = '#e63946'; }
        showToast('썸네일 이미지를 업로드하세요.'); btn.disabled = false; btn.textContent = '저장'; return;
      }
      if (['intro','catalog'].includes(archType)) {
        const summary = document.getElementById('f-summary')?.value?.trim() || '';
        if (summary.length < 60 || summary.length > 110) {
          document.getElementById('f-summary')?.focus();
          showToast('파일 정보 요약은 60~110자로 입력하세요.'); btn.disabled = false; btn.textContent = '저장'; return;
        }
      }
    }

    showActionLoader('저장 중...');
    try {
      // 단일 파일 업로드
      const uploadedUrls = {};
      for (const [key, f] of Object.entries(pendingFiles)) {
        btn.textContent = '파일 업로드 중...';
        const res = await fetch('/api/admin-upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
          body: JSON.stringify({ filename: f.filename, content: f.base64, folder: f.folder })
        });
        const d = await res.json();
        if (!d.ok) throw new Error('파일 업로드 실패: ' + d.message);
        uploadedUrls[key] = d.url;
      }

      // 다중 이미지 업로드 (press)
      const uploadedImages = [];
      for (const img of pendingImages) {
        if (img.url && !img.base64) { uploadedImages.push(img.url); continue; }
        btn.textContent = '이미지 업로드 중...';
        const res = await fetch('/api/admin-upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
          body: JSON.stringify({ filename: img.filename, content: img.base64, folder: 'press' })
        });
        const d = await res.json();
        if (!d.ok) throw new Error('이미지 업로드 실패: ' + d.message);
        uploadedImages.push(d.url);
      }

      // 다중 첨부파일 업로드 (notices)
      const uploadedAttachments = [];
      for (const att of pendingAttachments) {
        if (att.url && !att.base64) { uploadedAttachments.push({ name: att.name, url: att.url }); continue; }
        btn.textContent = '첨부파일 업로드 중...';
        const res = await fetch('/api/admin-upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
          body: JSON.stringify({ filename: att.name, content: att.base64, folder: 'notices' })
        });
        const d = await res.json();
        if (!d.ok) throw new Error('첨부파일 업로드 실패: ' + d.message);
        uploadedAttachments.push({ name: att.name, url: d.url });
      }

      // RTE 내 잔여 base64 이미지 → GitHub URL 교체 (notices/press/policy 공통)
      if (currentSection === 'notices' || currentSection === 'press' || ['privacy','terms','email-policy'].includes(currentSection)) {
        const rteEl = document.getElementById('f-content');
        if (rteEl) {
          const imgs = rteEl.querySelectorAll('img[src^="data:"]');
          if (imgs.length) {
            btn.textContent = '이미지 업로드 중...';
            await Promise.all(Array.from(imgs).map(async img => {
              try {
                const dataUrl = img.src;
                const base64 = dataUrl.split(',')[1];
                const mime = (dataUrl.match(/:(.*?);/) || [])[1] || 'image/jpeg';
                const ext = mime.split('/')[1] || 'jpg';
                const res = await fetch('/api/admin-upload', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
                  body: JSON.stringify({ filename: 'image-' + Date.now() + '.' + ext, content: base64, folder: currentSection })
                });
                const d = await res.json();
                if (d.ok) img.src = d.url;
              } catch (_) {}
            }));
          }
        }
      }

      btn.textContent = '저장 중...';

      // 폼 데이터 수집
      const item = collectFormData(uploadedUrls, uploadedImages, uploadedAttachments);

      if (editingId) {
        // 수정
        const existing = currentItems.find(i => i.id === editingId);
        const merged = { ...existing, ...item, id: editingId };
        const res = await fetch('/api/admin-data', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
          body: JSON.stringify({ type: currentSection, item: merged })
        });
        const d = await res.json();
        if (!d.ok) throw new Error(d.message);
        if (d.items) currentItems = d.items;
        else { const idx = currentItems.findIndex(i => i.id === editingId); if (idx !== -1) currentItems[idx] = merged; }
        saveFreshCache(currentSection, currentItems);
        showToast('수정됐습니다.');
      } else {
        // 추가
        item.createdAt = new Date().toISOString();
        const res = await fetch('/api/admin-data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
          body: JSON.stringify({ type: currentSection, item })
        });
        const d = await res.json();
        if (!d.ok) throw new Error(d.message);
        if (d.items) currentItems = d.items;
        else currentItems.unshift(d.item);
        document.getElementById('section-count').textContent = '(' + currentItems.length + '건)';
        saveFreshCache(currentSection, currentItems);
        showToast('추가됐습니다.');
      }

      hideForm();
      renderList();
    } catch (err) {
      showToast(err.message || '저장 실패', true);
    } finally {
      hideActionLoader();
    }
    btn.disabled = false; btn.textContent = '저장';
  }

  /* 보도자료 본문: 모든 인라인 타이포 스타일 제거 (CSS로 일괄 적용) */
  function stripPressHtml(html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    const LOCKED = ['font-size','line-height','letter-spacing','font-family','color','background','background-color','text-decoration','font-style'];
    div.querySelectorAll('*').forEach(el => {
      if (el.classList?.contains('rte-img') || el.classList?.contains('rte-img-block')) return;
      LOCKED.forEach(p => el.style.removeProperty(p));
      if (['B','STRONG'].includes(el.tagName)) {
        const span = document.createElement('span');
        span.className = 'rte-bold';
        span.innerHTML = el.innerHTML;
        el.replaceWith(span);
      } else if (['EM','I','U','MARK'].includes(el.tagName)) {
        const span = document.createElement('span');
        span.innerHTML = el.innerHTML;
        el.replaceWith(span);
      }
    });
    return div.innerHTML;
  }

  /* 공지사항 본문: 크기·자간·행간·정렬만 제거, 굵기·색상 등은 유지 */
  function sanitizeNoticeContent(html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    div.querySelectorAll('*').forEach(el => {
      if (el.classList.contains('rte-img') || el.classList.contains('rte-img-block')) return;
      el.style.removeProperty('font-size');
      el.style.removeProperty('line-height');
      el.style.removeProperty('letter-spacing');
      el.style.removeProperty('font-family');
      el.style.removeProperty('text-align');
      // font-weight, color, text-decoration, font-style은 유지 (굵기·색상·밑줄·기울기 반영)
    });
    return div.innerHTML;
  }

  function collectFormData(uploadedUrls, uploadedImages, uploadedAttachments) {
    const get = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
    const chk = id => { const el = document.getElementById(id); return el ? el.checked : false; };
    const rte = id => { const el = document.getElementById(id); return el ? el.innerHTML : ''; };
    const base = { pinned: chk('f-pinned') };

    if (currentSection === 'notices') {
      const _cat = get('f-notice-category');
      return { ...base, title: get('f-title'), content: sanitizeNoticeContent(rte('f-content')), date: get('f-date'), author: get('f-author'), attachments: uploadedAttachments, ...(_cat ? { category: _cat } : {}) };
    }
    if (currentSection === 'press') {
      // 선택된 썸네일을 첫 번째로 이동
      const reordered = [...uploadedImages];
      if (thumbnailIdx > 0 && thumbnailIdx < reordered.length) {
        const [thumb] = reordered.splice(thumbnailIdx, 1);
        reordered.unshift(thumb);
      }
      return { ...base, title: get('f-title'), content: stripPressHtml(rte('f-content')), date: get('f-date'), images: reordered, summary: chk('f-pinned') ? get('f-summary') : '' };
    }
    if (currentSection === 'archive') {
      const existing = editingId ? (currentItems.find(i => i.id === editingId) || {}) : {};
      const archType = get('f-type');
      const year = get('f-year') || '';
      const period = get('f-period') || '구분없음';
      const typeLabel = {intro:'기업소개서',catalog:'카탈로그/지명원',ir:'IR',ci:'CI'}[archType] || archType;
      const titleParts = [typeLabel, year, period !== '구분없음' ? period : ''].filter(Boolean);
      const isPinned = document.getElementById('f-pinned')?.checked;
      const summary = ['intro','catalog'].includes(archType) ? (get('f-summary') || '') : '';
      return {
        ...base,
        title: titleParts.join(' '),
        type: archType,
        year,
        period,
        date: year,
        file: uploadedUrls.file || (_archiveClearedFiles.file ? '' : existing.file) || '',
        fileEng: uploadedUrls.fileEng || (_archiveClearedFiles.fileEng ? '' : existing.fileEng) || '',
        thumbnail: uploadedUrls.thumbnail || (_archiveClearedFiles.thumbnail ? '' : existing.thumbnail) || '',
        pinned: isPinned,
        summary
      };
    }
    if (currentSection === 'faq') {
      const catChecks = document.querySelectorAll('.f-cat-check:checked');
      const category = Array.from(catChecks).map(c => c.value).join(',');
      return { ...base, category, question: get('f-question'), answer: get('f-answer') };
    }
    if (['privacy','terms','email-policy'].includes(currentSection)) {
      return { ...base, title: get('f-title'), content: sanitizeNoticeContent(rte('f-content')), date: get('f-date') };
    }
    return base;
  }

  /* ── RTE 이미지 블록 HTML 생성 ── */
  function rteImgHtml(src) {
    return `<div class="rte-img-block" style="display:block;text-align:center;margin:15px 0;"><img src="${src}" class="rte-img" style="max-width:100%;width:auto;height:auto;display:inline-block;"></div>`;
  }

  /* ── GitHub에 이미지 즉시 업로드 → URL 반환 ── */
  async function uploadImageNow(file, folder) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = async e => {
        const base64 = e.target.result.split(',')[1];
        try {
          const res = await fetch('/api/admin-upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
            body: JSON.stringify({ filename: file.name, content: base64, folder: folder || currentSection })
          });
          const d = await res.json();
          if (!d.ok) throw new Error(d.message || '업로드 실패');
          resolve(d.url);
        } catch (err) { reject(err); }
      };
      reader.onerror = () => reject(new Error('파일 읽기 실패'));
      reader.readAsDataURL(file);
    });
  }

  /* ── RTE 이미지 삽입 ── */
  function rteInsertImage() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    // 파일 다이얼로그 열기 전에 커서 위치를 플레이스홀더로 고정
    const el = document.getElementById('f-content');
    if (el) el.focus();
    const pid = 'rte-loading-' + Date.now();
    document.execCommand('insertHTML', false,
      `<span id="${pid}" style="display:inline-block;padding:2px 10px;background:#eef6fb;color:#1E8DCD;border-radius:4px;font-size:12px;">⏳ 업로드 중...</span>`);
    input.onchange = async function() {
      const file = input.files[0];
      if (!file) { const ph = document.getElementById(pid); if (ph) ph.remove(); return; }
      try {
        const url = await uploadImageNow(file);
        const placeholder = document.getElementById(pid);
        if (placeholder) {
          const tmp = document.createElement('div');
          tmp.innerHTML = rteImgHtml(url) + '<p><br></p>';
          // 이미지 블록 + 빈 줄을 순서대로 삽입
          const frag = document.createDocumentFragment();
          while (tmp.firstChild) frag.appendChild(tmp.firstChild);
          placeholder.replaceWith(frag);
        }
        // 보도자료: 이미지 목록에도 동기화
        if (currentSection === 'press') {
          pendingImages.push({ filename: file.name, url, base64: null });
          renderImageList();
        }
      } catch (err) {
        const placeholder = document.getElementById(pid);
        if (placeholder) placeholder.remove();
        showToast('이미지 업로드 실패: ' + err.message, true);
      }
    };
    input.click();
  }

  function showRteImgToolbar(img) {
    hideRteImgToolbar();
    _activeRteImg = img;
    img.classList.add('selected');
    const toolbar = document.createElement('div');
    toolbar.id = 'rte-img-toolbar';

    toolbar.innerHTML = `
      <span class="lbl">크기:</span>
      <button type="button" onmousedown="event.preventDefault();setRteImgWidth(25)">25%</button>
      <button type="button" onmousedown="event.preventDefault();setRteImgWidth(50)">50%</button>
      <button type="button" onmousedown="event.preventDefault();setRteImgWidth(75)">75%</button>
      <button type="button" onmousedown="event.preventDefault();setRteImgWidth(100)">100%</button>`;
    const block = img.closest('.rte-img-block') || img.parentNode;
    block.insertBefore(toolbar, img);
  }

  function hideRteImgToolbar() {
    const t = document.getElementById('rte-img-toolbar');
    if (t) t.remove();
    if (_activeRteImg) { _activeRteImg.classList.remove('selected'); _activeRteImg = null; }

  /* ── 액션 로더 ── */
  function showActionLoader(msg) {

  /* ── 미리보기 패널 ── */
  const PIN_SVG = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>`;

      const archMeta = [item.year, item.period && item.period !== '구분없음' ? item.period : ''].filter(Boolean).join(' ');

        ${item.file ? `<a href="${escAttr(item.file)}" target="_blank" style="color:#1E8DCD;font-size:14px;text-decoration:none;">파일 열기 →</a>` : ''}`;
    } else { // notices
      const metaLine = [item.date, item.author].filter(Boolean).join(' · ');
      const atts = (item.attachments || []).map(a=>`<a href="${escAttr(a.url)}" target="_blank" style="display:block;color:#1E8DCD;font-size:13px;margin-top:4px;text-decoration:none;">${escHtml(a.name)}</a>`).join('');
      body = `${metaLine ? `<div class="preview-meta-line">${escHtml(metaLine)}</div>` : ''}
        <div class="preview-title">${escHtml(item.title || '')}</div>
        ${atts ? `<div style="margin:12px 0;">${atts}</div>` : ''}
        <div class="preview-html">${item.content || ''}</div>`;
    }
    document.getElementById('preview-body').innerHTML = body;
    document.getElementById('preview-overlay').style.display = 'flex';
  }

  function _updatePreviewBtns(item) {
    const isPinned = !!item.pinned;
    const isPublished = item.published !== false;
    const pinBtn = document.getElementById('preview-pin-btn');
    const eyeBtn = document.getElementById('preview-eye-btn');
    if (pinBtn) {
      if (currentSection === 'faq' || ['privacy','terms','email-policy'].includes(currentSection)) {
        pinBtn.style.display = 'none';
      } else {
        pinBtn.style.display = '';
        pinBtn.className = 'preview-btn' + (isPinned ? ' pin-on' : '');
        pinBtn.innerHTML = PIN_SVG + (isPinned ? ' 고정 해제' : ' 고정');
      }
    }
    if (eyeBtn) {
      eyeBtn.className = 'preview-btn' + (isPublished ? '' : ' eye-off');
      eyeBtn.innerHTML = (isPublished ? SVG_EYE : SVG_EYE_OFF) + (isPublished ? ' 숨기기' : ' 게시');
    }
  }

  function closePreview() {
    previewId = null;
    document.getElementById('preview-overlay').style.display = 'none';
  }

  function previewEdit() {
    const id = previewId;
    closePreview();
    showForm(id);
  }

  async function previewPin() {
    if (!previewId) return;
    await togglePin(previewId);
    const item = currentItems.find(i => i.id === previewId);
    if (item) _updatePreviewBtns(item);
  }

  async function previewPublish() {
    if (!previewId) return;
    await togglePublish(previewId);
    const item = currentItems.find(i => i.id === previewId);
    if (item) _updatePreviewBtns(item);
  }

  async function previewDelete() {
    const id = previewId;
    closePreview();
    deleteItem(id);
  }

  /* ── 다크모드 ── */
  function toggleDarkMode(isDark) {
    document.body.classList.toggle('dark', isDark);
    document.querySelectorAll('#dark-mode-chk, #login-dark-chk').forEach(c => c.checked = isDark);
    const logo = document.getElementById('login-logo-img');
    if (logo) logo.src = isDark ? 'assets/logo-white.png' : 'assets/logo.png';
    const sidebarLogo = document.getElementById('sidebar-logo-img');
    if (sidebarLogo) sidebarLogo.src = isDark ? 'assets/logo-white.png' : 'assets/logo.png';
    const heroImg = document.querySelector('.login-hero-img');
    if (heroImg) heroImg.src = isDark ? 'assets/hero-dark.png' : 'assets/company-hero-bg2.png';
    localStorage.setItem('adminDarkMode', isDark ? '1' : '');
  }
  (function() {
    if (localStorage.getItem('adminDarkMode')) {
      document.body.classList.add('dark');
      document.querySelectorAll('#dark-mode-chk, #login-dark-chk').forEach(c => c.checked = true);
      const logo = document.getElementById('login-logo-img');
      if (logo) logo.src = 'assets/logo-white.png';
      const sidebarLogo = document.getElementById('sidebar-logo-img');
      if (sidebarLogo) sidebarLogo.src = 'assets/logo-white.png';
      const heroImg = document.querySelector('.login-hero-img');
      if (heroImg) heroImg.src = 'assets/hero-dark.png';
    }
  })();

  /* ── 유틸 ── */
  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

  function showToast(msg, isError) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast' + (isError ? ' error' : '');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }
</script>
  <script src="assets/header-scroll.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    const FAQ_CATS = ['ecoValue', 'ecoASSET', 'E-ASSET', '태양광 솔루션', '기타'];

    /* ── 보도자료 양식 다운로드 ── */
    function downloadPressTemplate() {
      if (!window.XLSX) { showToast('Excel 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.', true); return; }
      const wb = window.XLSX.utils.book_new();
      const wsData = [
        ['날짜', 2025, '년', 1, '월', 1, '일'],
        ['기사 제목', '입력하세요'],
        ['내용', '입력하세요']
      ];
      const ws = window.XLSX.utils.aoa_to_sheet(wsData);
      ws['!cols'] = [{ wch: 12 }, { wch: 50 }, { wch: 4 }, { wch: 6 }, { wch: 4 }, { wch: 6 }, { wch: 4 }];
      ['A1', 'A2', 'A3'].forEach(cell => {
        if (ws[cell]) ws[cell].s = { font: { bold: true } };
      });
      window.XLSX.utils.book_append_sheet(wb, ws, '보도자료');
      window.XLSX.writeFile(wb, '보도자료_양식.xlsx');
    }

    /* ── 보도자료 업로드 모달 ── */
    function showPressUploadModal() {
      document.getElementById('press-excel-file').value = '';
      document.getElementById('press-image-files').value = '';
      document.getElementById('press-excel-name').textContent = '클릭하여 엑셀 파일 선택 (.xlsx, .xls)';
      document.getElementById('press-excel-name').classList.remove('selected');
      document.getElementById('press-image-name').textContent = '클릭하여 이미지 파일 선택';
      document.getElementById('press-image-name').classList.remove('selected');
      document.getElementById('press-upload-overlay').style.display = 'flex';
    }

    function closePressUploadModal() {
      document.getElementById('press-upload-overlay').style.display = 'none';
    }

    function pressUploadFileChange(input, nameId) {
      const span = document.getElementById(nameId);
      if (!input.files.length) { span.textContent = '클릭하여 파일 선택'; span.classList.remove('selected'); return; }
      if (input.files.length === 1) {
        span.textContent = input.files[0].name;
      } else {
        span.textContent = input.files[0].name + ' 외 ' + (input.files.length - 1) + '개';
      }
      span.classList.add('selected');
    }

    async function submitPressUpload() {
      if (!window.XLSX) { showToast('Excel 라이브러리 로딩 중입니다.', true); return; }
      const excelInput = document.getElementById('press-excel-file');
      const imageInput = document.getElementById('press-image-files');
      if (!excelInput.files.length) { showToast('엑셀 파일을 선택해주세요.', true); return; }

      const btn = document.getElementById('press-upload-submit-btn');
      btn.disabled = true; btn.textContent = '처리 중...';
      showActionLoader('업로드 중...');

      try {
        // 1. 엑셀 파싱
        const excelBuf = await excelInput.files[0].arrayBuffer();
        const wb = window.XLSX.read(new Uint8Array(excelBuf), { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

        /* 양식: B2=년, D2=월, F2=일 / B3=기사 제목 / B4=기사 내용 */
        const year  = String(rows[1]?.[1] || '').trim();
        const month = String(rows[1]?.[3] || '').trim().padStart(2, '0');
        const day   = String(rows[1]?.[5] || '').trim().padStart(2, '0');
        const date  = year && month && day ? `${year}-${month}-${day}` : '';
        const title   = String(rows[2]?.[1] || '').trim();
        const content = String(rows[3]?.[1] || '').trim();

        if (!title) { showToast('엑셀 B3셀에 기사 제목이 없습니다.', true); btn.disabled = false; btn.textContent = '업로드'; return; }

        // 2. 이미지 업로드
        const uploadedImages = [];
        const imageFiles = Array.from(imageInput.files || []);
        for (let i = 0; i < imageFiles.length; i++) {
          btn.textContent = `이미지 업로드 중... (${i + 1}/${imageFiles.length})`;
          const base64 = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = e => resolve(e.target.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(imageFiles[i]);
          });
          const res = await fetch('/api/admin-upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
            body: JSON.stringify({ filename: imageFiles[i].name, content: base64, folder: 'press' })
          });
          const d = await res.json();
          if (d.ok) uploadedImages.push(d.url);
        }

        // 3. 항목 저장
        btn.textContent = '저장 중...';
        const item = { title, date, content, images: uploadedImages, pinned: false, published: true, createdAt: new Date().toISOString() };
        const res = await fetch('/api/admin-data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
          body: JSON.stringify({ type: 'press', item })
        });
        const d = await res.json();
        if (!d.ok) throw new Error(d.message);
        if (d.items) currentItems = d.items;
        else currentItems.unshift(d.item);
        document.getElementById('section-count').textContent = '(' + currentItems.length + '건)';
        saveFreshCache('press', currentItems);
        renderList();
        closePressUploadModal();
        showToast('보도자료가 추가됐습니다.');
      } catch (err) {
        showToast('업로드 실패: ' + (err.message || err), true);
      } finally {
        hideActionLoader();
      }
      btn.disabled = false; btn.textContent = '업로드';
    }

    /* ── FAQ 엑셀 양식 다운로드 ── */
    function downloadFaqTemplate() {
      if (!window.XLSX) { showToast('Excel 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.', true); return; }
      const wb = window.XLSX.utils.book_new();

      /* 양식: 1행=안내, 2행=헤더(C=구분, D=질문, E=답변), 3행~=데이터 */
      const infoRow  = ['', '', '구분', '질문', '답변'];
      const labelRow = ['', '', '(카테고리)', '(질문 내용)', '(답변 내용)'];
      const exampleRow = ['', '', FAQ_CATS[0], '질문 예시를 입력하세요', '답변 예시를 입력하세요'];
      const ws = window.XLSX.utils.aoa_to_sheet([infoRow, labelRow, exampleRow]);

      ws['!cols'] = [{ wch: 6 }, { wch: 6 }, { wch: 20 }, { wch: 45 }, { wch: 70 }];

      // 구분 열 드롭다운
      ws['!dataValidations'] = [{
        sqref: 'C3:C10000',
        type: 'list',
        formula1: '"' + FAQ_CATS.join(',') + '"',
        allowBlank: true,
        showDropDown: false,
        showErrorMessage: false
      }];

      window.XLSX.utils.book_append_sheet(wb, ws, 'FAQ');
      window.XLSX.writeFile(wb, 'FAQ_양식.xlsx');
    }

    /* ── FAQ 엑셀 다운로드 ── */
    function downloadFaqExcel() {
      if (!window.XLSX) { showToast('Excel 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.', true); return; }
      /* 양식: 1행=헤더, 2행=설명, 3행~=데이터 (C=구분, D=질문, E=답변) */
      const data = [
        ['', '', '구분', '질문', '답변'],
        ['', '', '(카테고리)', '(질문 내용)', '(답변 내용)']
      ];
      currentItems.forEach(item => {
        data.push(['', '', item.category || '', item.question || '', item.answer || '']);
      });
      const wb = window.XLSX.utils.book_new();
      const ws = window.XLSX.utils.aoa_to_sheet(data);
      ws['!cols'] = [{ wch: 6 }, { wch: 6 }, { wch: 20 }, { wch: 45 }, { wch: 70 }];
      window.XLSX.utils.book_append_sheet(wb, ws, 'FAQ');
      window.XLSX.writeFile(wb, 'FAQ_목록.xlsx');
    }

    /* ── FAQ 엑셀 업로드 ── */
    async function uploadFaqExcel(input) {
      if (!window.XLSX) { showToast('Excel 라이브러리 로딩 중입니다.', true); return; }
      const file = input.files[0];
      if (!file) return;
      input.value = '';

      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const wb = window.XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

          /* 양식: 1~2행=헤더/설명, 3행~=데이터 (C=구분, D=질문, E=답변) */
          if (rows.length < 3) { showToast('데이터가 없습니다.', true); return; }

          const items = [];
          const errors = [];

          for (let i = 2; i < rows.length; i++) {
            const category = String(rows[i][2] || '').trim();
            const question = String(rows[i][3] || '').trim();
            const answer   = String(rows[i][4] || '').trim();
            if (!question && !answer) break; // 빈 행이면 종료

            if (!category) {
              errors.push(`${i + 1}행: 구분(C열)이 없습니다.`);
              continue;
            }
            if (!question) {
              errors.push(`${i + 1}행: 질문(D열)이 없습니다.`);
              continue;
            }

            items.push({ category, question, answer, pinned: false });
          }

          if (errors.length) showToast('건너뜀: ' + errors.slice(0, 3).join(' / ') + (errors.length > 3 ? ` 외 ${errors.length - 3}건` : ''), true);
          if (!items.length) { showToast('업로드할 유효한 데이터가 없습니다.', true); return; }
          if (!confirm(`${items.length}개 항목을 FAQ에 추가하시겠습니까?`)) return;

          showToast(`업로드 중... (0/${items.length})`);
          let done = 0;
          for (const item of items) {
            try {
              const res = await fetch('/api/admin-data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + authHeader },
                body: JSON.stringify({ type: 'faq', item })
              });
              const d = await res.json();
              if (d.ok) {
                currentItems = d.items || [d.item, ...currentItems];
                done++;
              }
            } catch {}
          }

          saveFreshCache('faq', currentItems);
          document.getElementById('section-count').textContent = '(' + currentItems.length + '건)';
          renderList();
          showToast(`${done}개 항목이 추가됐습니다.`);
        } catch (err) {
          showToast('파일 읽기 실패: ' + err.message, true);
        }
      };
      reader.readAsArrayBuffer(file);
    }
  </script>
